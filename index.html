<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Chatbot</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f7fa;
}

/* Container */
.chat-container {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100dvh;
  max-width: 700px;
  margin: auto;
  background: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

/* Header */
.chat-header {
  background: #4a90e2;
  color: #fff;
  padding: clamp(10px, 2vw, 18px);
  text-align: center;
  font-size: clamp(16px, 2.5vw, 20px);
  font-weight: bold;
}

/* Chat */
#chatbox {
  flex: 1;
  padding: clamp(10px, 2vw, 20px);
  overflow-y: auto;
  background: #f9f9f9;
  scroll-behavior: smooth;
}

/* Messages */
.message {
  max-width: 75%;
  margin: 8px 0;
  padding: clamp(8px, 1.5vw, 14px);
  border-radius: 18px;
  line-height: 1.5;
  font-size: clamp(13px, 1.8vw, 15px);
  word-wrap: break-word;
  animation: fadeIn 0.25s ease-in;
}

.user {
  background: #4a90e2;
  color: #fff;
  margin-left: auto;
  border-bottom-right-radius: 6px;
}

.bot {
  background: #e5e5ea;
  color: #333;
  margin-right: auto;
  border-bottom-left-radius: 6px;
}

.loading {
  font-style: italic;
  color: #777;
}

/* Input */
#inputArea {
  position: sticky;
  bottom: 0;
  display: flex;
  gap: 8px;
  padding: clamp(8px, 2vw, 12px);
  background: #fff;
  border-top: 1px solid #ddd;
}

#prompt {
  flex: 1;
  padding: clamp(10px, 1.8vw, 14px);
  border: 1px solid #ccc;
  border-radius: 25px;
  font-size: clamp(13px, 1.8vw, 15px);
  outline: none;
}

#sendBtn {
  padding: clamp(10px, 1.8vw, 14px);
  background: #4a90e2;
  color: #fff;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  min-width: 70px;
  transition: 0.2s ease;
}

#sendBtn:hover {
  background: #357abd;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Mobile */
@media (max-width: 480px) {
  .message {
    max-width: 85%;
  }

  #sendBtn {
    min-width: 60px;
    font-size: 13px;
  }
}

/* Dark Mode */
@media (prefers-color-scheme: dark) {
  body {
    background: #121212;
  }

  .chat-container {
    background: #1e1e1e;
  }

  #chatbox {
    background: #181818;
  }

  .bot {
    background: #2c2c2e;
    color: #eee;
  }

  #inputArea {
    background: #1e1e1e;
    border-top: 1px solid #333;
  }

  #prompt {
    background: #2a2a2a;
    color: #fff;
    border: 1px solid #444;
  }
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">Learn English Chatbot (DistilGPT-2)</div>

  <div id="chatbox"></div>

  <div id="inputArea">
    <input id="prompt" type="text" placeholder="Type your message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js";

let generator;

// Initialize model
async function initModel() {
  generator = await pipeline("text-generation", "Xenova/distilgpt2");
}
initModel();

// Scroll helper
function scrollToBottom() {
  const chatbox = document.getElementById("chatbox");
  chatbox.scrollTop = chatbox.scrollHeight;
}

// Send message
async function sendMessage() {
  const input = document.getElementById("prompt");
  const chatbox = document.getElementById("chatbox");
  const userText = input.value.trim();
  if (!userText) return;

  // User message
  const userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.textContent = userText;
  chatbox.appendChild(userMsg);

  // Loading
  const loadingMsg = document.createElement("div");
  loadingMsg.className = "message loading";
  loadingMsg.textContent = "Bot is typing...";
  chatbox.appendChild(loadingMsg);

  scrollToBottom();

  // Generate response
  const output = await generator(userText, { max_length: 100 });
  const botText = output[0].generated_text;

  setTimeout(() => {
    chatbox.removeChild(loadingMsg);

    const botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.textContent = botText;
    chatbox.appendChild(botMsg);

    scrollToBottom();
  }, 1500);

  input.value = "";
}

// Events
document.getElementById("sendBtn").addEventListener("click", sendMessage);

document.getElementById("prompt").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
